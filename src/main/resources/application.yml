server:
  port: 9194

bridge:
  # mappings are generated from WSDL at startup
  auto:
    services-url: http://127.0.0.1:8080/services/
    path-prefix: /api
    http-method: POST

springdoc:
  show-actuator: false
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-operation-id: true
  api-docs:
    path: /v3/api-docs
    enabled: true

logging:
  level:
    io.github.connellite: DEBUG
